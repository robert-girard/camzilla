# Static, credential-free configuration. Runtime stream configuration is generated
# from environment secrets and is intentionally ignored by Git.
api:
  listen: ":1984"
  # This port is not published to the host. FastAPI proxies only WHEP signaling.
  allow_paths:
    - /api/webrtc
webrtc:
  listen: ":8555"
  candidates:
    - ${CAMZILLA_WEBRTC_CANDIDATE:127.0.0.1:8555}
streams:
  front-door: ${CAMZILLA_CAMERA_RTSP_URL}
