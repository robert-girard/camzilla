name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-and-compose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Security and privacy repository checks
        run: bash scripts/security-check.sh
      - name: Validate development and production Compose configuration
        run: |
          docker compose --env-file .env.example config
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml config
      - name: Build amd64 service images
        run: docker compose --env-file .env.example build

  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint and test backend without hardware
        working-directory: backend
        run: |
          uv sync --locked --all-groups
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy app
          uv run pytest

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint, type-check, unit-test, and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run deterministic Playwright flows
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
