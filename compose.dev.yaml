services:
  api:
    build:
      target: base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    read_only: false
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports: !override
      - "${CAMZILLA_BIND_HOST:-127.0.0.1}:${CAMZILLA_FRONTEND_PORT:-5173}:5173"
    read_only: false

volumes:
  frontend_node_modules:
